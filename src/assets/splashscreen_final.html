    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        background: #10131a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, sans-serif;
        overflow: hidden;
        gap: 0;
      }

      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: #171b24;
        border: 1px solid #2f3848;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
      }

      .logo img {
        width: 48px;
        height: 48px;
        object-fit: contain;
      }

      h1 {
        margin-top: 20px;
        font-size: 1.45rem;
        font-weight: 700;
        color: #e8edf5;
        letter-spacing: -0.01em;
        opacity: 0;
      }

      p {
        margin-top: 7px;
        font-size: 0.82rem;
        color: #9aa7b8;
        opacity: 0;
      }

      .loader-track {
        margin-top: 36px;
        width: 160px;
        height: 3px;
        background: #202636;
        border-radius: 99px;
        overflow: hidden;
        opacity: 0;
      }

      .loader-fill {
        height: 100%;
        width: 0%;
        background: #9bb7ff;
        border-radius: 99px;
      }
    </style>

    <h1 id="heading">Local Brain</h1>
    <p id="sub">Your private knowledge workspace</p>

    <div class="loader-track" id="track">
      <div class="loader-fill" id="fill"></div>
    </div>

    <script>
      const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

      tl.to('#logo', { opacity: 1, y: 0, duration: 0.5 })
        .from('#logo', { y: 10 }, '<')

        .to('#heading', { opacity: 1, y: 0, duration: 0.4 }, '-=0.1')
        .from('#heading', { y: 8 }, '<')

        .to('#sub', { opacity: 1, y: 0, duration: 0.35 }, '-=0.1')
        .from('#sub', { y: 6 }, '<')

        .to('#track', { opacity: 1, duration: 0.3 }, '+=0.1')
        .to('#fill', { width: '100%', duration: 2.0, ease: 'power1.inOut' }, '-=0.1')

        .call(() => {
          // invoke('close_splashscreen') — replace this when in Tauri
        });
    </script>
